# Claude Code Hooks Configuration
# These hooks will be merged into ~/.claude/settings.json
# See: https://code.claude.com/docs/en/hooks

# Hook event types:
#   PreToolUse       - Runs before tool calls (can block them)
#   PostToolUse      - Runs after tool calls complete
#   PermissionRequest - Runs when permission dialog is shown
#   UserPromptSubmit - Runs when user submits prompt
#   Notification     - Runs when Claude sends notifications
#   Stop             - Runs when Claude finishes responding
#   SubagentStop     - Runs when subagent completes
#   PreCompact       - Runs before context compaction
#   SessionStart     - Runs at session start/resume
#   SessionEnd       - Runs when session ends

hooks: {}

