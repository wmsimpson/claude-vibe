# Competitive Battlecard Registry
#
# This file maps competitors to their battlecard resources in Google Drive.
# Used by the competitive-analysis skill to automatically discover and retrieve
# relevant battlecards for compete questions.
#
# Format:
#   competitor_name:
#     name: Full competitor name
#     compete_type: platform|governance|oltp|ml|streaming|storage
#     description: Brief description of competitor
#     docs_url: Competitor documentation URL
#     battlecards:
#       - url: Google Drive URL (Docs or Slides)
#         title: Descriptive title
#         type: doc|slides
#         updated: YYYY-MM-DD
#         tags: [list, of, topics]
#     focus_areas: [list of common compete areas]
#     key_differentiators: [list of high-level differentiators]
#
# Compete Types:
#   - platform: Full data platform competitors (Snowflake, Redshift, Fabric, BigQuery)
#   - governance: Data governance and catalog solutions (Unity Catalog vs Polaris, Purview, Glue Catalog)
#   - oltp: OLTP database competitors (Lakebase, Supabase, Firebase, PlanetScale)
#   - ml: ML platform competitors (SageMaker, Vertex AI, Azure ML)
#   - streaming: Streaming platforms (Kafka, Kinesis, Pub/Sub)
#   - storage: Storage solutions (S3, ADLS, GCS)

competitors:
  snowflake:
    name: Snowflake
    compete_type: platform
    description: "Cloud data platform competitor - data warehousing, data sharing, Snowpark"
    docs_url: "https://docs.snowflake.com/"
    battlecards:
      - url: "https://docs.google.com/presentation/d/1fjrioZbSvkRnffwXhli2jlW5yBeLF-z-KFKRj2OrdHs/edit"
        title: "Databricks vs Snowflake - Comprehensive Battlecard"
        type: slides
        tags:
          - streaming
          - governance
          - ML
          - data_warehousing
          - snowpark
          - lakeflow
          - unity_catalog
          - general

    # Common compete areas
    focus_areas:
      - "Data Warehousing vs Lakehouse"
      - "Snowpipe Streaming vs Lakeflow"
      - "Snowpark vs Databricks ML"
      - "Data Sharing vs Delta Sharing"
      - "Unity Catalog vs Snowflake Governance"

    # Key differentiators (high-level, will be enriched from battlecards)
    key_differentiators:
      - "Unified data + AI platform (not just warehousing)"
      - "True streaming with Structured Streaming"
      - "Open formats (Delta Lake) vs proprietary"
      - "Native Spark for distributed compute"
      - "MLflow for end-to-end ML lifecycle"

  redshift:
    name: Amazon Redshift
    compete_type: platform
    description: "AWS data warehousing service - SQL analytics, data warehousing, AWS ecosystem integration"
    docs_url: "https://docs.aws.amazon.com/redshift/"
    battlecards:
      - url: "https://docs.google.com/presentation/d/1lY1ISrZu8haf4_IKYEjfYiiLf8qvXPklta48snUjeWg/edit"
        title: "Databricks vs Amazon Redshift - Comprehensive Battlecard"
        type: slides
        tags:
          - data_warehousing
          - sql
          - aws
          - cost
          - performance
          - ML
          - streaming
          - general

    # Common compete areas
    focus_areas:
      - "Data Warehousing vs Lakehouse Architecture"
      - "SQL Performance and Query Optimization"
      - "Data Warehousing vs Unified Data Platform"
      - "Cost Optimization and TCO"
      - "AWS Ecosystem Integration"
      - "ML/AI Capabilities"
      - "Streaming and Real-time Analytics"
      - "Open Formats (Delta Lake) vs Proprietary"

    # Key differentiators (high-level, will be enriched from battlecards)
    key_differentiators:
      - "Unified data + AI platform (not just warehousing)"
      - "Open formats (Delta Lake) vs proprietary Redshift format"
      - "Native Spark for distributed compute vs Redshift's MPP architecture"
      - "Advanced ML/AI capabilities (MLflow, AutoML) vs Redshift ML limitations"
      - "True streaming with Structured Streaming vs Redshift's batch-only approach"
      - "Multi-cloud support vs AWS-only"
      - "Better cost efficiency for large-scale data engineering workloads"

  fabric:
    name: Microsoft Fabric
    compete_type: platform
    description: "Microsoft unified analytics platform - Power BI integration, OneLake, data lakehouse, Microsoft ecosystem"
    docs_url: "https://learn.microsoft.com/en-us/fabric/"
    battlecards:
      - url: "https://docs.google.com/presentation/d/18QcSkZXOERtCIaFHzcaodJ7AXfT5mZXUMKvkVtPIkmk/edit"
        title: "Databricks vs Microsoft Fabric - Comprehensive Battlecard"
        type: slides
        tags:
          - unified_analytics
          - power_bi
          - onelake
          - microsoft
          - lakehouse
          - ML
          - streaming
          - general

    # Common compete areas
    focus_areas:
      - "Unified Analytics Platform Architecture"
      - "Data Lakehouse Implementation (OneLake vs Delta Lake)"
      - "Power BI Integration vs Databricks SQL + BI Tools"
      - "Microsoft Ecosystem Integration"
      - "ML/AI Capabilities and MLOps"
      - "Streaming and Real-time Processing"
      - "Open Formats and Interoperability"
      - "Enterprise Governance and Security"

    # Key differentiators (high-level, will be enriched from battlecards)
    key_differentiators:
      - "Mature, production-proven lakehouse (Delta Lake) vs Fabric's newer OneLake"
      - "Superior ML/AI platform (MLflow, AutoML, Feature Store) vs Fabric's limited ML"
      - "True streaming with Structured Streaming vs Fabric's batch-oriented approach"
      - "Multi-cloud support vs Microsoft-only"
      - "Larger ecosystem and partner integrations"
      - "Better performance for large-scale data engineering"
      - "More flexible compute options (serverless, classic, SQL warehouses)"
      - "Proven at scale with thousands of enterprise customers"

  # Governance Competitors
  polaris:
    name: Polaris
    compete_type: governance
    description: "Snowflake's data catalog and governance solution - Unity Catalog competitor"
    docs_url: "https://docs.snowflake.com/en/user-guide/data-governance-overview"
    battlecards:
      - url: "https://docs.google.com/presentation/d/1u97b0sFC5N1FRaEBbhMp5RPDAX5-Nt1HcyPLr5VK_ZE/edit?slide=id.g2f23d35adb0_0_128#slide=id.g2f23d35adb0_0_128"
        title: "Unity Catalog vs Polaris - Governance Battlecard"
        type: slides
        tags:
          - governance
          - catalog
          - unity_catalog
          - data_lineage
          - polaris

    focus_areas:
      - "Data Catalog and Discovery"
      - "Data Lineage and Impact Analysis"
      - "Access Control and Security Policies"
      - "Data Quality and Profiling"
      - "Cross-Cloud Governance"
      - "Integration with Compute Platforms"

    key_differentiators:
      - "Open, vendor-neutral catalog (Unity Catalog) vs Snowflake-locked Polaris"
      - "Works with any compute engine (Spark, Presto, etc.) vs Snowflake-only"
      - "Multi-cloud support vs Snowflake ecosystem only"
      - "Unified governance across data and AI assets"
      - "Native integration with Delta Lake and open formats"

  purview:
