          - catalog
          - unity_catalog
          - microsoft
          - azure
          - purview

    focus_areas:
      - "Data Catalog and Discovery"
      - "Data Lineage and Impact Analysis"
      - "Access Control and Security"
      - "Data Classification and Sensitivity Labels"
      - "Microsoft Ecosystem Integration"
      - "Multi-Cloud Governance"

    key_differentiators:
      - "Integrated with compute platform (Unity Catalog) vs separate service (Purview)"
      - "Open formats and multi-engine support vs Microsoft-centric"
      - "Real-time governance vs batch scanning approach"
      - "Unified catalog for data and ML assets"
      - "Better performance for large-scale catalogs"

  glue_catalog:
    name: AWS Glue Data Catalog
    compete_type: governance
    description: "AWS's data catalog service - Unity Catalog competitor"
    docs_url: "https://docs.aws.amazon.com/glue/latest/dg/catalog-and-crawler.html"
    battlecards:
      - url: "https://docs.google.com/presentation/d/12OFyAEpfELUKfd4Z86P_9F3G1KfG64MFQjL_C2PIv8E/edit?slide=id.g231331eb284_0_0#slide=id.g231331eb284_0_0"
        title: "Unity Catalog vs AWS Glue Catalog - Governance Battlecard"
        type: slides
        tags:
          - governance
          - catalog
          - unity_catalog
          - aws
          - glue

    focus_areas:
      - "Data Catalog and Discovery"
      - "Schema Management and Evolution"
      - "Access Control and IAM Integration"
      - "Crawler-based Discovery"
      - "AWS Ecosystem Integration"
      - "Multi-Engine Query Support"

    key_differentiators:
      - "Integrated governance with compute (Unity Catalog) vs separate catalog service"
      - "Fine-grained access control vs IAM-only approach"
      - "Open formats and Delta Lake integration vs Hive Metastore format"
      - "Real-time catalog updates vs crawler-based discovery"
      - "Cross-cloud support vs AWS-only"

  # OLTP Competitors
