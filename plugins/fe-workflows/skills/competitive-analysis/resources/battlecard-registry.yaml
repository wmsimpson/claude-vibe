        title: "Databricks Lakebase - OLTP Battlecard"
        type: slides
        tags:
          - oltp
          - transactional
          - database
          - lakehouse
          - lakebase

    focus_areas:
      - "OLTP vs OLAP Use Cases"
      - "Transactional Workload Performance"
      - "ACID Compliance and Consistency"
      - "Concurrency and Locking"
      - "Integration with Analytics Workloads"
      - "Storage and Compute Architecture"

    key_differentiators:
      - "Unified platform for analytics and ML vs OLTP-only focus"
      - "Proven at scale for analytics workloads vs newer OLTP solution"
      - "Rich ecosystem and integrations vs limited ecosystem"
      - "Advanced ML/AI capabilities vs basic transactional features"
      - "Multi-cloud support vs single-cloud focus"

