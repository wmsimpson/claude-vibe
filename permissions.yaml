# Claude Code Permissions Configuration
# These permissions will be merged into ~/.claude/settings.json

allow:
  # Base permissions
  - "Skill"

  # File access - code directory
  - "Read(~/code/**)"
  - "Edit(~/code/**)"
  - "Write(~/code/**)"

  # File access - tmp directory
  - "Read(//tmp/**)"
  - "Edit(//tmp/**)"
  - "Write(//tmp/**)"

  # File access - vibe directory
  - "Read(~/.vibe/**)"
  - "Edit(~/.vibe/**)"
  - "Write(~/.vibe/**)"

  # File access - claude directory
  - "Read(~/.claude/**)"

  # File access - home directory (read only)
  - "Read(~/**)"

  # MCP tool permissions (active)
  # Add MCP permissions here as you enable servers in mcp-servers.yaml

  # DISABLED MCP permissions (Databricks-internal servers, see mcp-servers.yaml)
